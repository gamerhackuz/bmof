<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        label { display: flex; justify-content: space-between; font-size: 14px; color: #555; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #4361ee; }
        .box-model { display: flex; justify-content: center; margin-bottom: 20px; }
        .margin { background: #f8d7da; padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 8px; }
        .border { background: #fff3cd; padding: 10px; border-radius: 6px; }
        .padding { background: #d1e7dd; padding: 15px; border-radius: 4px; }
        .content { background: #cfe2ff; width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #003366; border-radius: 4px; }
        .legend { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .legend span { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
        .css-output { background: #2d2d35; color: #00d4ff; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 CSS Box Model Vizualizator</h2>
        <div class="legend">
            <span style="background:#f8d7da;color:#842029;">Margin</span>
            <span style="background:#fff3cd;color:#664d03;">Border</span>
            <span style="background:#d1e7dd;color:#0f5132;">Padding</span>
            <span style="background:#cfe2ff;color:#084298;">Content</span>
        </div>
        <div class="box-model">
            <div class="margin" id="marginBox">
                <div class="border" id="borderBox">
                    <div class="padding" id="paddingBox">
                        <div class="content" id="contentBox">Content</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div><label>Margin: <span id="mVal">20</span>px</label><input type="range" min="0" max="40" value="20" id="margin"></div>
            <div><label>Border: <span id="bVal">10</span>px</label><input type="range" min="0" max="20" value="10" id="border"></div>
            <div><label>Padding: <span id="pVal">15</span>px</label><input type="range" min="0" max="30" value="15" id="padding"></div>
            <div><label>Width: <span id="wVal">80</span>px</label><input type="range" min="40" max="200" value="80" id="width"></div>
        </div>
        <div class="css-output" id="code"></div>
    </div>

    <script>
        const inputs = ['margin','border','padding','width'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', update));

        function update() {
            const m = document.getElementById('margin').value;
            const b = document.getElementById('border').value;
            const p = document.getElementById('padding').value;
            const w = document.getElementById('width').value;

            document.getElementById('mVal').textContent = m;
            document.getElementById('bVal').textContent = b;
            document.getElementById('pVal').textContent = p;
            document.getElementById('wVal').textContent = w;

            document.getElementById('marginBox').style.padding = m + 'px';
            document.getElementById('borderBox').style.padding = b + 'px';
            document.getElementById('borderBox').style.border = '2px solid #842029';
            document.getElementById('paddingBox').style.padding = p + 'px';
            document.getElementById('contentBox').style.width = w + 'px';

            document.getElementById('code').textContent = `.box {
  margin: ${m}px;
  border: 2px solid;
  padding: ${p}px;
  width: ${w}px;
}`;
        }
        update();
    </script>
</body>
</html>
